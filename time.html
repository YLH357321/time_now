<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当前时间</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            overflow: hidden;
            position: relative;
            margin: 0;
            padding: 0;
        }

        /* 16:9 主容器 */
.main-container {
    position: relative;
    width: 100vw;
    aspect-ratio: 16 / 9;
    max-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 40px;
}

        /* 3列布局容器 */
        .layout-columns {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            width: 100%;
            height: 100%;
        }

        /* 列容器 */
        .column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            flex: 1;
        }

        .column.center-column {
            flex: 1.5;
        }

        /* 玻璃拟态卡片容器 */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px 40px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 80px rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            flex: 1;
            max-width: 100%;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.2),
                inset 0 0 80px rgba(255, 255, 255, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        .card.center {
            flex: 1;
            padding: 40px 50px;
            min-height: 100%;
        }

        /* 中间卡片的时间显示更大 */
        .card.center .time {
            font-size: 5rem;
            min-width: 320px;
            letter-spacing: 6px;
        }

        .card.center .date-display {
            font-size: 1.4rem;
        }

        .card.center .lunar-date {
            font-size: 1.3rem;
        }

        .card.center .weekday {
            font-size: 1.2rem;
        }

        .card.center .timezone {
            font-size: 0.95rem;
            padding: 10px 22px;
        }

        .card.center .card-title {
            font-size: 1.3rem;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 时间显示 */
        .time-display {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 15px;
        }

        .time {
            font-size: 3.8rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            animation: pulse 2s infinite ease-in-out;
            font-family: 'Outfit', 'Courier New', monospace;
            min-width: 280px;
        }

        .period {
            display: none;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.95;
                transform: scale(1.02);
            }
        }

        /* 日期显示 */
        .date-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 8px;
        }

        .date-display {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1.5px;
        }

        /* 星期显示 */
        .weekday {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
        }

        /* 农历日期显示 */
        .lunar-date {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 2px;
        }

        /* 时区信息 */
        .timezone {
            margin-top: 15px;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            transition: all 0.3s ease;
        }

        .timezone:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 倒计时显示 */
        .countdown-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 15px;
        }

        .countdown-number {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s infinite ease-in-out;
            font-family: 'Outfit', 'Courier New', monospace;
            min-width: 200px;
        }

        .countdown-unit {
            font-size: 1.4rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes glow {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.2);
            }
        }

        /* 不同卡片的渐变色 */
        .card.left .countdown-number {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card.right .countdown-number {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card.extra-1 .countdown-number {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card.extra-2 .countdown-number {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 隐藏按钮 */
        .hidden-button {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .hidden-button:hover {
            opacity: 0.1;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #000;
        }

        .modal-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #333;
            font-family: 'Outfit', 'Microsoft YaHei', sans-serif;
            text-align: center;
            font-style: italic;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .main-container {
                padding: 15px 30px;
            }
            .layout-columns {
                gap: 15px;
            }
            .column {
                gap: 15px;
            }
            .card {
                padding: 25px 30px;
            }
            .card.center {
                padding: 35px 45px;
            }
            .time {
                font-size: 4.2rem;
                min-width: 280px;
            }
            .countdown-number {
                font-size: 2.8rem;
                min-width: 160px;
            }
        }

        @media (max-width: 900px) {
            .main-container {
                padding: 15px;
            }
            .layout-columns {
                flex-direction: column;
                gap: 15px;
            }
            .column {
                flex-direction: row;
                gap: 15px;
            }
            .column.center-column {
                flex-direction: column;
            }
            .card {
                flex: 1;
                min-height: 200px;
            }
            .card.center {
                flex: none;
                padding: 35px 45px;
            }
            .time {
                font-size: 4rem;
                letter-spacing: 3px;
                min-width: 300px;
            }
            .date-display {
                font-size: 1.2rem;
            }
            .weekday {
                font-size: 1rem;
            }
            .lunar-date {
                font-size: 1.1rem;
            }
            .countdown-number {
                font-size: 2.5rem;
                min-width: 180px;
            }
            .countdown-unit {
                font-size: 1.2rem;
            }
            .card-title {
                font-size: 1rem;
            }
            .shape {
                opacity: 0.2;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 10px;
            }
            .layout-columns {
                gap: 10px;
            }
            .column {
                flex-direction: column;
                gap: 10px;
            }
            .card {
                padding: 20px 25px;
                border-radius: 20px;
            }
            .card.center {
                padding: 30px 35px;
            }
            .time {
                font-size: 3.5rem;
                letter-spacing: 2px;
                min-width: 260px;
            }
            .date-display {
                font-size: 1rem;
            }
            .weekday {
                font-size: 0.9rem;
                letter-spacing: 2px;
            }
            .lunar-date {
                font-size: 0.95rem;
            }
            .countdown-number {
                font-size: 2rem;
                min-width: 140px;
            }
            .countdown-unit {
                font-size: 1rem;
            }
            .card-title {
                font-size: 0.9rem;
            }
            .timezone {
                font-size: 0.8rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 16:9 主容器 -->
    <div class="main-container" id="mainContainer">

        <!-- 主布局：3列 -->
        <div class="layout-columns">

    <script>
        // 背景变色 - 15分钟周期，三种颜色
        // 颜色1: 湖绿 (0-14分钟)
        // 颜色2: 粉紫 (15-29分钟)  
        // 颜色3: 橙红 (30-44分钟)
        // 循环: 45-59分钟回到湖绿
        
        let targetGradientIndex = 0;
        let currentProgress = 0;
        let animationId = null;
        
                // 定义四种渐变
        const gradients = [
            {   // 湖绿渐变 (0-14分钟)
                stops: [
                    { pos: 0, color: { r: 44, g: 110, b: 73 } },    // #2c6e49
                    { pos: 0.5, color: { r: 72, g: 149, b: 107 } },  // #48956b
                    { pos: 1, color: { r: 129, g: 199, b: 132 } }    // #81c784
                ]
            },
            {   // 粉紫渐变 (15-29分钟)
                stops: [
                    { pos: 0, color: { r: 156, g: 39, b: 176 } },    // #9c27b0
                    { pos: 0.5, color: { r: 219, g: 112, b: 147 } },  // #db7093
                    { pos: 1, color: { r: 255, g: 182, b: 193 } }     // #ffb6c1
                ]
            },
            {   // 橙红渐变 (30-44分钟)
                stops: [
                    { pos: 0, color: { r: 230, g: 81, b: 0 } },       // #e65100
                    { pos: 0.5, color: { r: 255, g: 124, b: 48 } },    // #ff7c30
                    { pos: 1, color: { r: 255, g: 183, b: 77 } }       // #ffb74d
                ]
            },
                        {   // 金银渐变 (45-59分钟)
                stops: [
                    { pos: 0, color: { r: 169, g: 169, b: 169 } },    // 银灰 #a9a9a9
                    { pos: 0.5, color: { r: 212, g: 175, b: 55 } },   // 金色 #d4af37
                    { pos: 1, color: { r: 238, g: 215, b: 100 } }     // 浅金 #eed764
                ]
            }
        ];
        
        // 颜色插值函数
        function interpolateColor(color1, color2, t) {
            return {
                r: Math.round(color1.r + (color2.r - color1.r) * t),
                g: Math.round(color1.g + (color2.g - color1.g) * t),
                b: Math.round(color1.b + (color2.b - color1.b) * t)
            };
        }
        
        // 生成渐变字符串
        function generateGradientString(stops) {
            const stopStrings = stops.map(stop => {
                return `rgb(${stop.color.r}, ${stop.color.g}, ${stop.color.b}) ${stop.pos * 100}%`;
            });
            return `linear-gradient(135deg, ${stopStrings.join(', ')})`;
        }
        
        // 获取当前分钟对应的渐变索引       
            function getGradientIndexByMinute(minutes) {
            if (minutes < 15) return 0;      // 湖绿
            if (minutes < 30) return 1;      // 粉紫
            if (minutes < 45) return 2;      // 橙红
            return 3;                         //金银
        }
        
        // 设置背景（直接设置，无动画）
        function setBackgroundDirect(index) {
            const gradientStr = generateGradientString(gradients[index].stops);
            document.getElementById('mainContainer').style.background = gradientStr;
            currentProgress = index;
            targetGradientIndex = index;
        }
        
        // 平滑过渡到目标渐变
        function startTransitionTo(targetIndex) {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            const startIndex = currentProgress;
            const duration = 15000; // 15秒缓慢过渡
            const startTime = performance.now();
            
            function getInterpolatedGradient(progress) {
                // progress: 0~2 之间的连续值，在两个渐变之间插值
                const fromIdx = Math.floor(progress);
                const toIdx = Math.min(fromIdx + 1, gradients.length - 1);
                const t = progress - fromIdx;
                
                if (fromIdx === toIdx) {
                    return generateGradientString(gradients[fromIdx].stops);
                }
                
                const stops = [];
                const len = gradients[fromIdx].stops.length;
                for (let i = 0; i < len; i++) {
                    const color1 = gradients[fromIdx].stops[i].color;
                    const color2 = gradients[toIdx].stops[i].color;
                    stops.push({
                        pos: gradients[fromIdx].stops[i].pos,
                        color: interpolateColor(color1, color2, t)
                    });
                }
                return generateGradientString(stops);
            }
            
            function animate(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const easeT = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                
                const newProgress = startIndex + (targetIndex - startIndex) * easeT;
                currentProgress = newProgress;
                
                const gradientStr = getInterpolatedGradient(newProgress);
                document.getElementById('mainContainer').style.background = gradientStr;
                
                if (t < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    animationId = null;
                    currentProgress = targetIndex;
                }
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 根据分钟数更新背景
        function updateBackgroundColor() {
            const now = new Date();
            const minutes = now.getMinutes();
            const newTarget = getGradientIndexByMinute(minutes);
            
            if (newTarget !== targetGradientIndex) {
                targetGradientIndex = newTarget;
                startTransitionTo(newTarget);
            }
        }
        
        // 初始化背景
        function initBackground() {
            const now = new Date();
            const minutes = now.getMinutes();
            targetGradientIndex = getGradientIndexByMinute(minutes);
            currentProgress = targetGradientIndex;
            const gradientStr = generateGradientString(gradients[targetGradientIndex].stops);
            document.getElementById('mainContainer').style.background = gradientStr;
        }
        
        initBackground();
        setInterval(updateBackgroundColor, 1000);

        // 农历数据（1900-2100年）

            0x0c960, 0x0d954, 0x0d4a0, 0x0da50, 0x07552, 0x056a0, 0x0abb7, 0x025d0, 0x092d0, 0x0cab5,

        // 农历转换函数
        function getLunarDate(date) {
            const gan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
            const zhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            const animals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            const solarMonth = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '冬月', '腊月'];
            const solarDay = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                             '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                             '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];

            let i, leap = 0, temp = 0;
            let baseDate = new Date(1900, 0, 31);
            let offset = Math.floor((date - baseDate) / 86400000);

            for (i = 1900; i < 2101 && offset > 0; i++) {
                temp = lYearDays(i);
                offset -= temp;
            }

            if (offset < 0) {
                offset += temp;
                i--;
            }

            const year = i;
            leap = leapMonth(i);
            let isLeap = false;

            for (i = 1; i < 13 && offset > 0; i++) {
                if (leap > 0 && i === (leap + 1) && isLeap === false) {
                    --i;
                    isLeap = true;
                    temp = leapDays(year);
                } else {
                    temp = monthDays(year, i);
                }

                if (isLeap === true && i === (leap + 1)) isLeap = false;

                offset -= temp;
            }

            if (offset === 0 && leap > 0 && i === leap + 1) {
                if (isLeap) {
                    isLeap = false;
                } else {
                    isLeap = true;
                    --i;
                }
            }

            if (offset < 0) {
                offset += temp;
                --i;
            }

            const month = i;
            const day = offset + 1;

            const ganZhiYear = gan[(year - 4) % 10] + zhi[(year - 4) % 12];
            const lunarMonth = isLeap ? '闰' + solarMonth[month - 1] : solarMonth[month - 1];
            const lunarDay = solarDay[day - 1];

            return `${ganZhiYear}年 ${lunarMonth}${lunarDay}`;
        }

        function lYearDays(y) {
            let i, sum = 348;
            for (i = 0x8000; i > 0x8; i >>= 1) {
                sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
            }
            return (sum + leapDays(y));
        }

        function leapDays(y) {
            if (leapMonth(y)) {
                return ((lunarInfo[y - 1900] & 0x10000) ? 30 : 29);
            } else {
                return 0;
            }
        }

        function leapMonth(y) {
            return (lunarInfo[y - 1900] & 0xf);
        }

        function monthDays(y, m) {
            return ((lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29);
        }

        function updateTime() {
            const now = new Date();
            
            // 获取时间组件
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // 24小时制，直接显示小时（0-23）
            // 格式化时间，确保两位数
            const formattedTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            // 获取日期组件
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            
            // 格式化日期
            const formattedDate = `${year}年${month}月${day}日`;
            
            // 获取星期
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            
            // 获取时区信息
            const timezoneOffset = -now.getTimezoneOffset() / 60;
            const timezoneSign = timezoneOffset >= 0 ? '+' : '';
            const formattedTimezone = `UTC${timezoneSign}${timezoneOffset}`;
            
            // 更新页面元素
            document.getElementById('time').textContent = formattedTime;
            document.getElementById('date').textContent = formattedDate;
            document.getElementById('lunar-date').textContent = getLunarDate(now);
            document.getElementById('weekday').textContent = weekday;
            document.getElementById('timezone').textContent = `${formattedTimezone} 中国标准时间`;
            
            // 更新倒计时
            updateCountdown();
        }

        function updateCountdown() {
            const now = new Date();

            // 目标日期1：2027年1月1日（攀登&卓越）
            const competitionDate = new Date(2027, 0, 1);
            const competitionDiff = competitionDate - now;

            if (competitionDiff <= 0) {
                document.getElementById('countdown-days-competition').textContent = '0';
            } else {
                const competitionDays = Math.floor(competitionDiff / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days-competition').textContent = competitionDays;
            }

            // 目标日期2：2026年6月9日（那一天）
            const physicsDate = new Date(2026, 5, 9);
            const physicsDiff = physicsDate - now;

            if (physicsDiff <= 0) {
                document.getElementById('countdown-days-physics').textContent = '0';
            } else {
                const physicsDays = Math.floor(physicsDiff / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days-physics').textContent = physicsDays;
            }

            // 目标日期3：2026年9月19日（第43届复赛）
            const competition43Date = new Date(2026, 8, 19);
            const competition43Diff = competition43Date - now;

            if (competition43Diff <= 0) {
                document.getElementById('countdown-days-extra1').textContent = '0';
            } else {
                const competition43Days = Math.floor(competition43Diff / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days-extra1').textContent = competition43Days;
            }

            // 目标日期4：2026年5月1日（刷完物理学难题集萃）
            const physicsCompleteDate = new Date(2026, 4, 1);
            const physicsCompleteDiff = physicsCompleteDate - now;

            if (physicsCompleteDiff <= 0) {
                document.getElementById('countdown-days-extra2').textContent = '0';
            } else {
                const physicsCompleteDays = Math.floor(physicsCompleteDiff / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days-extra2').textContent = physicsCompleteDays;
            }
        }

        // 立即更新一次
        updateTime();

        // 每秒更新一次
        setInterval(updateTime, 1000);

        // 弹窗控制
        const modal = document.getElementById('quote-modal');
        const quoteButton = document.getElementById('quote-button');
        const closeBtn = document.getElementById('close-modal');

        // 点击时间按钮显示弹窗
        quoteButton.addEventListener('click', function() {
            modal.classList.add('show');
        });

        // 点击关闭按钮关闭弹窗
        closeBtn.addEventListener('click', function() {
            modal.classList.remove('show');
        });

        // 点击弹窗外部关闭弹窗
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });

        // 按ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                modal.classList.remove('show');
            }
        });

        // 时区按钮点击播放音频
        const timezoneBtn = document.getElementById('timezone');
        const audio = new Audio('voice1.mp3');
        
        // 触碰/点击播放音频（支持移动端touch和PC端click）
        timezoneBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            audio.currentTime = 0; // 重置到开始
            audio.play().catch(err => {
                console.log('音频播放失败:', err);
            });
        });
        
        // 移动端触摸事件
        timezoneBtn.addEventListener('touchstart', function(e) {
            e.stopPropagation();
            audio.currentTime = 0;
            audio.play().catch(err => {
                console.log('音频播放失败:', err);
            });
        });
    </script>
